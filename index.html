<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Itapemirim - Sistema de Gestão de Transportes</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* ... (mantenha todo o CSS existente, está correto) ... */
    </style>
</head>
<body>
    <!-- ... (mantenha toda a estrutura HTML existente) ... -->

    <script>
        // ====== CONFIGURAÇÃO DE PERSISTÊNCIA ======
        const STORAGE_KEY = 'itapemirim_db';
        
        // DADOS INICIAIS (apenas para primeira execução)
        const dadosIniciais = {
            motoristas: [
                { id: 1, nome: "Carlos Alberto Silva", status: "ativo" },
                { id: 2, nome: "Marcos Roberto Santos", status: "ativo" },
                { id: 3, nome: "José Eduardo Lima", status: "ferias" }
            ],
            onibus: [
                { id: 1, nome: "Ônibus 001 - Mercedes", status: "disponivel" },
                { id: 2, nome: "Ônibus 002 - Scania", status: "em_rota" },
                { id: 3, nome: "Micro-ônibus 003 - Volkswagen", status: "disponivel" }
            ],
            rotas: [
                { id: 1, nome: "Linha Centro - Norte", origem: "Centro", destino: "Bairro Norte" },
                { id: 2, nome: "Linha Sul - Shopping", origem: "Bairro Sul", destino: "Shopping Center" },
                { id: 3, nome: "Linha Expresso Aeroporto", origem: "Rodoviária", destino: "Aeroporto" }
            ],
            viagens: [],
            trocas: []
        };

        // Variáveis globais do banco de dados
        let DB = {
            motoristas: [],
            onibus: [],
            rotas: [],
            viagens: [],
            trocas: []
        };

        let nextId = {
            motorista: 1,
            onibus: 1,
            rota: 1,
            viagem: 1,
            troca: 1
        };

        let mensagemEditavel = '';

        // ====== FUNÇÕES DE PERSISTÊNCIA ======
        
        // Salvar dados no localStorage
        function salvarDados() {
            const dadosParaSalvar = {
                DB: DB,
                nextId: nextId
            };
            localStorage.setItem(STORAGE_KEY, JSON.stringify(dadosParaSalvar));
        }

        // Carregar dados do localStorage
        function carregarDadosSalvos() {
            const dadosSalvos = localStorage.getItem(STORAGE_KEY);
            
            if (dadosSalvos) {
                // Carrega dados salvos
                const dados = JSON.parse(dadosSalvos);
                DB = dados.DB;
                nextId = dados.nextId;
                return true;
            }
            return false;
        }

        // Inicializar com dados padrão
        function inicializarDadosPadrao() {
            // Gera as datas atuais para as viagens
            const hoje = new Date().toISOString().split('T')[0];
            const amanha = new Date(Date.now() + 86400000).toISOString().split('T')[0];
            
            // Copia os dados iniciais
            DB.motoristas = [...dadosIniciais.motoristas];
            DB.onibus = [...dadosIniciais.onibus];
            DB.rotas = [...dadosIniciais.rotas];
            
            // Configura viagens iniciais com datas atuais
            DB.viagens = [
                { 
                    id: 1, 
                    motoristaId: 1, 
                    onibusId: 1, 
                    rotaId: 1, 
                    data: hoje, 
                    horarioSaida: "08:00", 
                    observacoes: "Viagem regular", 
                    status: "concluida" 
                },
                { 
                    id: 2, 
                    motoristaId: 2, 
                    onibusId: 2, 
                    rotaId: 2, 
                    data: hoje, 
                    horarioSaida: "10:30", 
                    observacoes: "", 
                    status: "em_andamento" 
                },
                { 
                    id: 3, 
                    motoristaId: 1, 
                    onibusId: 3, 
                    rotaId: 3, 
                    data: amanha, 
                    horarioSaida: "14:00", 
                    observacoes: "Viagem especial", 
                    status: "programada" 
                }
            ];
            
            DB.trocas = [
                { 
                    id: 1, 
                    viagemId: 1, 
                    motoristaAnterior: 1, 
                    motoristaNovo: 2, 
                    data: hoje, 
                    hora: "09:30", 
                    motivo: "Motivo pessoal", 
                    status: "aprovada" 
                }
            ];
            
            // Configura os próximos IDs
            nextId = {
                motorista: 4,
                onibus: 4,
                rota: 4,
                viagem: 4,
                troca: 2
            };
            
            // Salva os dados iniciais
            salvarDados();
        }

        // ====== FUNÇÃO PRINCIPAL DE INICIALIZAÇÃO ======
        function inicializarSistema() {
            // Tenta carregar dados salvos
            if (!carregarDadosSalvos()) {
                // Se não houver dados salvos, inicializa com dados padrão
                inicializarDadosPadrao();
            }
            
            // Garante que as estruturas existam
            if (!DB.motoristas) DB.motoristas = [];
            if (!DB.onibus) DB.onibus = [];
            if (!DB.rotas) DB.rotas = [];
            if (!DB.viagens) DB.viagens = [];
            if (!DB.trocas) DB.trocas = [];
            
            // Carrega o dashboard inicial
            carregarDashboard();
        }

        // ====== FUNÇÕES DE NAVEGAÇÃO (MANTIDAS) ======
        
        function showPage(pageName, element) {
            try {
                document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
                const pageElement = document.getElementById(pageName + '-page');
                if (pageElement) {
                    pageElement.classList.add('active');
                }
                
                document.querySelectorAll('.menu-item').forEach(m => m.classList.remove('active'));
                if (element) element.classList.add('active');
                
                atualizarPagina(pageName);
            } catch (error) {
                console.error('Erro ao mostrar página:', error);
                alert('Erro ao carregar a página. Por favor, recarregue o sistema.');
            }
        }

        function atualizarPagina(page) {
            try {
                switch(page) {
                    case 'dashboard': carregarDashboard(); break;
                    case 'motoristas': listarMotoristas(); break;
                    case 'onibus': listarOnibus(); break;
                    case 'rotas': listarRotas(); break;
                    case 'viagens': listarViagens(); break;
                    case 'compartilhar': carregarCompartilhar(); break;
                    case 'trocas': carregarTrocas(); break;
                }
            } catch (error) {
                console.error(`Erro ao atualizar página ${page}:`, error);
            }
        }

        // ====== FUNÇÕES DO DASHBOARD ======
        
        function carregarDashboard() {
            try {
                document.getElementById('currentDate').textContent = new Date().toLocaleDateString('pt-BR', { 
                    weekday: 'long', 
                    year: 'numeric', 
                    month: 'long', 
                    day: 'numeric' 
                });
                
                const motoristasAtivos = DB.motoristas.filter(m => m.status === 'ativo').length;
                const onibusDisponiveis = DB.onibus.filter(o => o.status === 'disponivel').length;
                const trocasPendentes = DB.trocas.filter(t => t.status === 'pendente').length;
                
                const statsHTML = `
                    <div class="stat-card">
                        <div class="stat-icon"><i class="fas fa-user-tie"></i></div>
                        <div class="stat-info">
                            <h3>Motoristas Ativos</h3>
                            <div class="number">${motoristasAtivos}</div>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon"><i class="fas fa-bus-alt"></i></div>
                        <div class="stat-info">
                            <h3>Veículos Disponíveis</h3>
                            <div class="number">${onibusDisponiveis}</div>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon"><i class="fas fa-map-marked-alt"></i></div>
                        <div class="stat-info">
                            <h3>Rotas Cadastradas</h3>
                            <div class="number">${DB.rotas.length}</div>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon"><i class="fas fa-exchange-alt"></i></div>
                        <div class="stat-info">
                            <h3>Trocas Pendentes</h3>
                            <div class="number">${trocasPendentes}</div>
                        </div>
                    </div>
                `;
                document.getElementById('dashboardStats').innerHTML = statsHTML;
                
                // Últimas viagens
                const ultimasViagensDiv = document.getElementById('ultimasViagens');
                if (DB.viagens.length === 0) {
                    ultimasViagensDiv.innerHTML = '<div class="empty-state"><i class="fas fa-bus"></i><p>Nenhuma viagem registrada</p></div>';
                } else {
                    ultimasViagensDiv.innerHTML = DB.viagens.slice(-5).reverse().map(v => `
                        <div class="item-list">
                            <p><i class="far fa-calendar-alt"></i> <strong>${formatarData(v.data)}</strong> - ${v.horarioSaida}</p>
                            <p><i class="fas fa-user"></i> Motorista: ${getMotoristaNome(v.motoristaId)}</p>
                            <p><span class="badge badge-info"><i class="fas fa-circle"></i> ${v.status}</span></p>
                        </div>
                    `).join('');
                }
                
                // Trocas recentes
                const trocasRecentesDiv = document.getElementById('trocasRecentes');
                if (DB.trocas.length === 0) {
                    trocasRecentesDiv.innerHTML = '<div class="empty-state"><i class="fas fa-exchange-alt"></i><p>Nenhuma troca registrada</p></div>';
                } else {
                    trocasRecentesDiv.innerHTML = DB.trocas.slice(-5).reverse().map(t => `
                        <div class="item-list">
                            <p><i class="far fa-calendar-alt"></i> <strong>${formatarData(t.data)}</strong></p>
                            <p><i class="fas fa-exchange-alt"></i> ${getMotoristaNome(t.motoristaAnterior)} → ${getMotoristaNome(t.motoristaNovo)}</p>
                            <p><span class="badge badge-${t.status === 'aprovada' ? 'success' : 'warning'}"><i class="fas fa-circle"></i> ${t.status}</span></p>
                        </div>
                    `).join('');
                }
                
                atualizarBadges();
            } catch (error) {
                console.error('Erro ao carregar dashboard:', error);
            }
        }

        function atualizarBadges() {
            try {
                const motoristasCount = document.getElementById('motoristasCount');
                const trocasPendentes = document.getElementById('trocasPendentes');
                
                if (motoristasCount) {
                    motoristasCount.textContent = DB.motoristas.filter(m => m.status === 'ativo').length;
                }
                if (trocasPendentes) {
                    trocasPendentes.textContent = DB.trocas.filter(t => t.status === 'pendente').length;
                }
            } catch (error) {
                console.error('Erro ao atualizar badges:', error);
            }
        }

        // ====== FUNÇÕES DE COMPARTILHAMENTO ======
        
        function carregarCompartilhar() {
            try {
                const selectMotorista = document.getElementById('filtroMotorista');
                if (selectMotorista) {
                    selectMotorista.innerHTML = '<option value="">Todos os motoristas</option>' +
                        DB.motoristas.map(m => `<option value="${m.id}">${m.nome}</option>`).join('');
                }
                gerarPreviewWhatsApp();
            } catch (error) {
                console.error('Erro ao carregar compartilhamento:', error);
            }
        }

        function gerarPreviewWhatsApp() {
            try {
                const dataFiltro = document.getElementById('filtroData')?.value || '';
                const motoristaFiltro = document.getElementById('filtroMotorista')?.value || '';
                
                let mensagem = `🚌 *ITAPEMIRIM - Relatório de Viagens*\n`;
                mensagem += `📅 *Data do relatório:* ${new Date().toLocaleDateString('pt-BR')}\n`;
                mensagem += `━━━━━━━━━━━━━━━━━━\n\n`;
                
                let viagensFiltradas = [...DB.viagens];
                if (dataFiltro) {
                    viagensFiltradas = viagensFiltradas.filter(v => v.data === dataFiltro);
                }
                if (motoristaFiltro) {
                    viagensFiltradas = viagensFiltradas.filter(v => v.motoristaId === parseInt(motoristaFiltro));
                }
                
                mensagem += `📊 *TOTAL DE VIAGENS: ${viagensFiltradas.length}*\n`;
                mensagem += `━━━━━━━━━━━━━━━━━━\n\n`;
                
                if (viagensFiltradas.length > 0) {
                    mensagem += `🕒 *DETALHES DAS VIAGENS*\n\n`;
                    
                    viagensFiltradas.forEach((v, index) => {
                        const motorista = DB.motoristas.find(m => m.id === v.motoristaId);
                        const onibus = DB.onibus.find(o => o.id === v.onibusId);
                        const rota = DB.rotas.find(r => r.id === v.rotaId);
                        
                        mensagem += `*${index + 1}ª VIAGEM*\n`;
                        mensagem += `📅 Data: ${formatarData(v.data)}\n`;
                        mensagem += `⏰ Horário de Saída: ${v.horarioSaida}\n`;
                        mensagem += `👤 Motorista: ${motorista ? motorista.nome : 'N/A'}\n`;
                        mensagem += `🚌 Veículo: ${onibus ? onibus.nome : 'N/A'}\n`;
                        mensagem += `🗺️ Rota: ${rota ? rota.nome : 'N/A'}\n`;
                        mensagem += `📍 Origem: ${rota ? rota.origem : 'N/A'}\n`;
                        mensagem += `🏁 Destino: ${rota ? rota.destino : 'N/A'}\n`;
                        mensagem += `📌 Status: ${v.status}\n`;
                        if (v.observacoes) {
                            mensagem += `📝 Obs: ${v.observacoes}\n`;
                        }
                        mensagem += `\n`;
                    });
                } else {
                    mensagem += `Nenhuma viagem encontrada com os filtros selecionados.\n`;
                }
                
                mensagem += `━━━━━━━━━━━━━━━━━━\n`;
                mensagem += `✅ *Relatório gerado automaticamente pelo Sistema Itapemirim*`;
                
                mensagemEditavel = mensagem;
                const previewElement = document.getElementById('mensagemPreview');
                if (previewElement) {
                    previewElement.textContent = mensagem;
                }
            } catch (error) {
                console.error('Erro ao gerar preview WhatsApp:', error);
            }
        }

        function editarMensagem() {
            try {
                document.getElementById('modalContent').innerHTML = `
                    <div class="modal-header">
                        <h2><i class="fas fa-edit"></i> Editar Mensagem</h2>
                        <button class="modal-close" onclick="fecharModal()"><i class="fas fa-times"></i></button>
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-file-alt"></i> Edite o texto abaixo:</label>
                        <textarea class="form-control" id="mensagemEdit" rows="20" style="font-family: monospace;">${mensagemEditavel.replace(/</g, '&lt;').replace(/>/g, '&gt;')}</textarea>
                    </div>
                    <button class="btn btn-success" onclick="salvarEdicaoMensagem()" style="width:100%;">
                        <i class="fas fa-save"></i> Salvar e Visualizar
                    </button>
                `;
                document.getElementById('modal').classList.add('active');
            } catch (error) {
                console.error('Erro ao editar mensagem:', error);
            }
        }

        function salvarEdicaoMensagem() {
            try {
                const textarea = document.getElementById('mensagemEdit');
                if (textarea) {
                    mensagemEditavel = textarea.value;
                    const previewElement = document.getElementById('mensagemPreview');
                    if (previewElement) {
                        previewElement.textContent = mensagemEditavel;
                    }
                }
                fecharModal();
            } catch (error) {
                console.error('Erro ao salvar edição da mensagem:', error);
            }
        }

        function copiarMensagem() {
            try {
                navigator.clipboard.writeText(mensagemEditavel).then(() => {
                    alert('✅ Mensagem copiada para a área de transferência!');
                }).catch(() => {
                    // Fallback para navegadores mais antigos
                    const textarea = document.createElement('textarea');
                    textarea.value = mensagemEditavel;
                    document.body.appendChild(textarea);
                    textarea.select();
                    document.execCommand('copy');
                    document.body.removeChild(textarea);
                    alert('✅ Mensagem copiada para a área de transferência!');
                });
            } catch (error) {
                alert('❌ Erro ao copiar mensagem. Tente novamente.');
                console.error('Erro ao copiar:', error);
            }
        }

        function enviarWhatsApp() {
            try {
                const textoCodificado = encodeURIComponent(mensagemEditavel);
                const urlWhatsApp = `https://api.whatsapp.com/send?text=${textoCodificado}`;
                window.open(urlWhatsApp, '_blank');
            } catch (error) {
                alert('❌ Erro ao abrir WhatsApp. Tente novamente.');
                console.error('Erro ao enviar WhatsApp:', error);
            }
        }

        // ====== CRUD MOTORISTAS ======
        
        function listarMotoristas() {
            const tbody = document.getElementById('motoristasTableBody');
            if (!tbody) return;
            
            if (DB.motoristas.length === 0) {
                tbody.innerHTML = '<tr><td colspan="3"><div class="empty-state"><i class="fas fa-user-tie"></i><p>Nenhum motorista cadastrado</p></div></td></tr>';
                return;
            }
            
            tbody.innerHTML = DB.motoristas.map(m => `
                <tr>
                    <td><strong>${m.nome}</strong></td>
                    <td><span class="badge badge-${m.status === 'ativo' ? 'success' : m.status === 'ferias' ? 'warning' : 'danger'}"><i class="fas fa-circle"></i> ${m.status}</span></td>
                    <td>
                        <div class="actions-cell">
                            <button class="btn btn-warning btn-sm" onclick="editarMotorista(${m.id})"><i class="fas fa-edit"></i> Editar</button>
                            <button class="btn btn-danger btn-sm" onclick="excluirMotorista(${m.id})"><i class="fas fa-trash-alt"></i> Excluir</button>
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        function filtrarMotoristas(termo) {
            const tbody = document.getElementById('motoristasTableBody');
            if (!tbody) return;
            
            const filtrados = DB.motoristas.filter(m => 
                m.nome.toLowerCase().includes(termo.toLowerCase())
            );
            
            if (filtrados.length === 0) {
                tbody.innerHTML = '<tr><td colspan="3"><div class="empty-state"><i class="fas fa-search"></i><p>Nenhum motorista encontrado</p></div></td></tr>';
                return;
            }
            
            tbody.innerHTML = filtrados.map(m => `
                <tr>
                    <td><strong>${m.nome}</strong></td>
                    <td><span class="badge badge-${m.status === 'ativo' ? 'success' : m.status === 'ferias' ? 'warning' : 'danger'}"><i class="fas fa-circle"></i> ${m.status}</span></td>
                    <td>
                        <div class="actions-cell">
                            <button class="btn btn-warning btn-sm" onclick="editarMotorista(${m.id})"><i class="fas fa-edit"></i> Editar</button>
                            <button class="btn btn-danger btn-sm" onclick="excluirMotorista(${m.id})"><i class="fas fa-trash-alt"></i> Excluir</button>
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        function abrirFormMotorista(id = null) {
            const motorista = id ? DB.motoristas.find(m => m.id === id) : null;
            const titulo = motorista ? 'Editar Motorista' : 'Novo Motorista';
            
            document.getElementById('modalContent').innerHTML = `
                <div class="modal-header">
                    <h2><i class="fas fa-user-plus"></i> ${titulo}</h2>
                    <button class="modal-close" onclick="fecharModal()"><i class="fas fa-times"></i></button>
                </div>
                <form onsubmit="salvarMotorista(event, ${id || 'null'})">
                    <div class="form-group">
                        <label><i class="fas fa-user"></i> Nome Completo *</label>
                        <input type="text" class="form-control" id="motoristaNome" value="${motorista ? motorista.nome : ''}" required>
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-circle"></i> Status</label>
                        <select class="form-control" id="motoristaStatus">
                            <option value="ativo" ${motorista && motorista.status === 'ativo' ? 'selected' : ''}>✅ Ativo</option>
                            <option value="inativo" ${motorista && motorista.status === 'inativo' ? 'selected' : ''}>❌ Inativo</option>
                            <option value="ferias" ${motorista && motorista.status === 'ferias' ? 'selected' : ''}>🏖️ Férias</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-primary" style="width:100%;margin-top:10px;">
                        <i class="fas fa-save"></i> Salvar Motorista
                    </button>
                </form>
            `;
            document.getElementById('modal').classList.add('active');
        }

        function salvarMotorista(event, id) {
            event.preventDefault();
            
            try {
                const nome = document.getElementById('motoristaNome').value.trim();
                const status = document.getElementById('motoristaStatus').value;
                
                if (!nome) {
                    alert('❌ Por favor, informe o nome do motorista.');
                    return;
                }
                
                if (id) {
                    // Editar motorista existente
                    const index = DB.motoristas.findIndex(m => m.id === id);
                    if (index !== -1) {
                        DB.motoristas[index].nome = nome;
                        DB.motoristas[index].status = status;
                    }
                } else {
                    // Criar novo motorista
                    const novoMotorista = {
                        id: nextId.motorista,
                        nome: nome,
                        status: status
                    };
                    DB.motoristas.push(novoMotorista);
                    nextId.motorista++;
                }
                
                // Salva no localStorage
                salvarDados();
                
                fecharModal();
                listarMotoristas();
                atualizarBadges();
                carregarDashboard();
                gerarPreviewWhatsApp();
                
                alert('✅ Motorista salvo com sucesso!');
            } catch (error) {
                console.error('Erro ao salvar motorista:', error);
                alert('❌ Erro ao salvar motorista. Tente novamente.');
            }
        }

        function editarMotorista(id) { 
            abrirFormMotorista(id); 
        }

        function excluirMotorista(id) {
            const motorista = DB.motoristas.find(m => m.id === id);
            if (!motorista) return;
            
            if (confirm(`Tem certeza que deseja excluir o motorista "${motorista.nome}"?`)) {
                // Verifica se o motorista está em alguma viagem
                const viagensComMotorista = DB.viagens.filter(v => v.motoristaId === id);
                if (viagensComMotorista.length > 0) {
                    if (!confirm(`Este motorista está em ${viagensComMotorista.length} viagem(ns). Deseja continuar mesmo assim?`)) {
                        return;
                    }
                }
                
                DB.motoristas = DB.motoristas.filter(m => m.id !== id);
                salvarDados();
                listarMotoristas();
                atualizarBadges();
                carregarDashboard();
                gerarPreviewWhatsApp();
                alert('✅ Motorista excluído com sucesso!');
            }
        }

        // ====== CRUD ÔNIBUS ======
        
        function listarOnibus() {
            const tbody = document.getElementById('onibusTableBody');
            if (!tbody) return;
            
            if (DB.onibus.length === 0) {
                tbody.innerHTML = '<tr><td colspan="3"><div class="empty-state"><i class="fas fa-bus-alt"></i><p>Nenhum veículo cadastrado</p></div></td></tr>';
                return;
            }
            
            tbody.innerHTML = DB.onibus.map(o => `
                <tr>
                    <td><strong>${o.nome}</strong></td>
                    <td><span class="badge badge-${o.status === 'disponivel' ? 'success' : o.status === 'em_rota' ? 'warning' : 'danger'}"><i class="fas fa-circle"></i> ${o.status.replace('_', ' ')}</span></td>
                    <td>
                        <div class="actions-cell">
                            <button class="btn btn-warning btn-sm" onclick="editarOnibus(${o.id})"><i class="fas fa-edit"></i> Editar</button>

        function salvarViagem(event, id) {
            event.preventDefault();
            
            try {
                const motoristaId = parseInt(document.getElementById('viagemMotorista').value);
                const onibusId = parseInt(document.getElementById('viagemOnibus').value);
                const rotaId = parseInt(document.getElementById('viagemRota').value);
                const data = document.getElementById('viagemData').value;
                const horarioSaida = document.getElementById('viagemSaida').value;
                const observacoes = document.getElementById('viagemObs').value.trim();
                const status = document.getElementById('viagemStatus').value;
                
                if (!motoristaId || !onibusId || !rotaId || !data || !horarioSaida) {
                    alert('❌ Por favor, preencha todos os campos obrigatórios!');
                    return;
                }
                
                if (id) {
                    const index = DB.viagens.findIndex(v => v.id === id);
                    if (index !== -1) {
                        DB.viagens[index].motoristaId = motoristaId;
                        DB.viagens[index].onibusId = onibusId;
                        DB.viagens[index].rotaId = rotaId;
                        DB.viagens[index].data = data;
                        DB.viagens[index].horarioSaida = horarioSaida;
                        DB.viagens[index].observacoes = observacoes;
                        DB.viagens[index].status = status;
                    }
                } else {
                    const novaViagem = {
                        id: nextId.viagem,
                        motoristaId: motoristaId,
                        onibusId: onibusId,
                        rotaId: rotaId,
                        data: data,
                        horarioSaida: horarioSaida,
                        observacoes: observacoes,
                        status: status
                    };
                    DB.viagens.push(novaViagem);
                    nextId.viagem++;
                    
                    // Atualiza status do ônibus para "em rota" se a viagem não estiver cancelada
                    if (status !== 'cancelada') {
                        const onibus = DB.onibus.find(o => o.id === onibusId);
                        if (onibus && onibus.status === 'disponivel') {
                            onibus.status = 'em_rota';
                        }
                    }
                }
                
                salvarDados();
                fecharModal();
                listarViagens();
                carregarDashboard();
                gerarPreviewWhatsApp();
                alert('✅ Viagem salva com sucesso!');
            } catch (error) {
                console.error('Erro ao salvar viagem:', error);
                alert('❌ Erro ao salvar viagem. Tente novamente.');
            }
        }

        function abrirTroca(viagemId) {
            const viagem = DB.viagens.find(v => v.id === viagemId);
            if (!viagem) {
                alert('Viagem não encontrada!');
                return;
            }
            
            const motoristaAtual = DB.motoristas.find(m => m.id === viagem.motoristaId);
            const motoristasDisponiveis = DB.motoristas.filter(m => m.status === 'ativo' && m.id !== viagem.motoristaId);
            
            if (motoristasDisponiveis.length === 0) {
                alert('Não há motoristas disponíveis para troca no momento!');
                return;
            }
            
            document.getElementById('modalContent').innerHTML = `
                <div class="modal-header">
                    <h2><i class="fas fa-exchange-alt"></i> Trocar Motorista - Viagem #${viagem.id}</h2>
                    <button class="modal-close" onclick="fecharModal()"><i class="fas fa-times"></i></button>
                </div>
                <div class="info-box">
                    <p><i class="fas fa-user"></i> <strong>Motorista Atual:</strong> ${motoristaAtual ? motoristaAtual.nome : 'N/A'}</p>
                    <p><i class="far fa-calendar-alt"></i> <strong>Data:</strong> ${formatarData(viagem.data)}</p>
                    <p><i class="fas fa-clock"></i> <strong>Horário de Saída:</strong> ${viagem.horarioSaida}</p>
                </div>
                <form onsubmit="salvarTroca(event, ${viagemId})">
                    <div class="form-group">
                        <label><i class="fas fa-user-check"></i> Novo Motorista *</label>
                        <select class="form-control" id="trocaNovoMotorista" required>
                            <option value="">Selecione um motorista disponível</option>
                            ${motoristasDisponiveis.map(m => `<option value="${m.id}">${m.nome}</option>`).join('')}
                        </select>
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-info-circle"></i> Motivo da Troca *</label>
                        <textarea class="form-control" id="trocaMotivo" required rows="3" placeholder="Descreva o motivo da substituição..."></textarea>
                    </div>
                    <button type="submit" class="btn btn-warning" style="width:100%;margin-top:10px;">
                        <i class="fas fa-exchange-alt"></i> Confirmar Troca de Motorista
                    </button>
                </form>
            `;
            document.getElementById('modal').classList.add('active');
        }

        function salvarTroca(event, viagemId) {
            event.preventDefault();
            
            try {
                const viagem = DB.viagens.find(v => v.id === viagemId);
                if (!viagem) {
                    alert('Viagem não encontrada!');
                    return;
                }
                
                const novoMotoristaId = parseInt(document.getElementById('trocaNovoMotorista').value);
                const motivo = document.getElementById('trocaMotivo').value.trim();
                
                if (!novoMotoristaId || !motivo) {
                    alert('❌ Por favor, preencha todos os campos!');
                    return;
                }
                
                const troca = {
                    id: nextId.troca,
                    viagemId: viagemId,
                    motoristaAnterior: viagem.motoristaId,
                    motoristaNovo: novoMotoristaId,
                    data: new Date().toISOString().split('T')[0],
                    hora: new Date().toLocaleTimeString('pt-BR'),
                    motivo: motivo,
                    status: 'pendente'
                };
                
                DB.trocas.unshift(troca);
                nextId.troca++;
                
                // Atualiza o motorista na viagem
                viagem.motoristaId = novoMotoristaId;
                if (!viagem.observacoes) viagem.observacoes = '';
                viagem.observacoes += `\n🔄 Troca de motorista em ${troca.data}: ${motivo}`;
                
                salvarDados();
                fecharModal();
                carregarTrocas();
                atualizarBadges();
                carregarDashboard();
                gerarPreviewWhatsApp();
                alert('✅ Troca registrada com sucesso! Aguardando aprovação.');
            } catch (error) {
                console.error('Erro ao salvar troca:', error);
                alert('❌ Erro ao salvar troca. Tente novamente.');
            }
        }

        function aprovarTroca(id) {
            const troca = DB.trocas.find(t => t.id === id);
            if (troca) {
                troca.status = 'aprovada';
                salvarDados();
                carregarTrocas();
                atualizarBadges();
                carregarDashboard();
                gerarPreviewWhatsApp();
                alert('✅ Troca aprovada com sucesso!');
            }
        }

        function rejeitarTroca(id) {
            const troca = DB.trocas.find(t => t.id === id);
            if (troca) {
                troca.status = 'rejeitada';
                
                // Reverte o motorista na viagem
                const viagem = DB.viagens.find(v => v.id === troca.viagemId);
                if (viagem) {
                    viagem.motoristaId = troca.motoristaAnterior;
                }
                
                salvarDados();
                carregarTrocas();
                atualizarBadges();
                carregarDashboard();
                gerarPreviewWhatsApp();
                alert('❌ Troca rejeitada. Motorista original foi restaurado.');
            }
        }

        // ====== FUNÇÕES AUXILIARES ======
        
        function getMotoristaNome(id) {
            const motorista = DB.motoristas.find(m => m.id === id);
            return motorista ? motorista.nome : 'Desconhecido';
        }

        function formatarData(data) {
            if (!data) return '';
            const [ano, mes, dia] = data.split('-');
            return `${dia}/${mes}/${ano}`;
        }

        function fecharModal() {
            document.getElementById('modal').classList.remove('active');
        }

        // Fechar modal ao clicar fora
        window.onclick = function(event) {
            if (event.target === document.getElementById('modal')) {
                fecharModal();
            }
        }

        // ====== INICIALIZAÇÃO DO SISTEMA ======
        
        // Função para resetar o sistema (útil para debug)
        function resetarSistema() {
            if (confirm('⚠️ ATENÇÃO: Isso apagará TODOS os dados e restaurará o sistema ao estado inicial. Deseja continuar?')) {
                localStorage.removeItem(STORAGE_KEY);
                location.reload();
            }
        }

        // Inicializa o sistema ao carregar a página
        inicializarSistema();
        
        // Adiciona atalho de reset para debug (pressione Ctrl+Shift+R)
        document.addEventListener('keydown', function(e) {
            if (e.ctrlKey && e.shiftKey && e.key === 'R') {
                e.preventDefault();
                resetarSistema();
            }
        });
        
        console.log('✅ Sistema Itapemirim inicializado com sucesso!');
        console.log('💾 Dados salvos em localStorage:', STORAGE_KEY);
        console.log('🔄 Para resetar o sistema, pressione Ctrl+Shift+R');
    </script>
</body>
</html>
